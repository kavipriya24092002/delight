      <span class="navbar-toggler-icon "></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto  mb-lg-0">

         <li class="nav-item">
          <a class="nav-link text-dark mt-1" href="{% url "index" %}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark mt-1" aria-current="page" href="{% url "about" %}">About Us</a>

        <li class="nav-item">
          <a class="nav-link text-dark mt-1" href="{% url "menu" %}">Menu </a>
        </li>
       
       <li class="nav-item">
          <a class="nav-link text-dark mt-1" href="{% url "contact" %}">Contact</a>
        </li>
       <div class="d-flex gap-3 mt-2">
        <!-- search icon -->
       <li>
        <i class="bi bi-search mt-5" id="searchicon" ></i>

<li class="nav-item dropdown ">

<!-- OFFCANVAS -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu">
    <div class="offcanvas-header">
        <h5>Your Cart</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <div id="cart-item"></div>

        <hr>
        <h5>Total: <span id="total-price">₹0.00</span></h5>
        <hr>
        <button class="btn btn-success w-100">PayNow</button>
    </div>
</div>
   <!-- offcanva end -->
      <!-- Modal -->
<div class="modal fade" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Search Products</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="text"
               id="searchInput"
               class="form-control"
               placeholder="Search products..."
               onkeyup="liveSearch()">

        <div id="searchResults" class="mt-3"></div>

      </div>

    </div>
  </div>
</div>
